parameters:
    twitch.client.id: '%env(TWITCH_CLIENT_ID)%'
    twitch.client.secret: '%env(TWITCH_CLIENT_SECRET)%'

services:
    _defaults:
        autowire: true
        autoconfigure: true
        bind:
            string $twitchClientId: '%twitch.client.id%'

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'


